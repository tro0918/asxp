name: RFC proposal
description: Propose an observable specification or schema change.
title: "rfc: "
labels: [rfc]
body:
  - type: textarea
    id: usecase
    attributes: {label: Cross-runtime use case}
    validations: {required: true}
  - type: textarea
    id: proposal
    attributes: {label: Proposed behavior}
    validations: {required: true}
  - type: textarea
    id: compatibility
    attributes: {label: Compatibility and migration impact}
    validations: {required: true}
  - type: textarea
    id: security
    attributes: {label: Security and privacy impact}
    validations: {required: true}
  - type: textarea
    id: evidence
    attributes: {label: Reference implementation and conformance evidence}
