name: conformance
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m unittest discover -s tests -v
      - run: python scripts/run_tck.py > tck-result.json
      - run: python -m src.asxp.cli pack examples/v0.2/refund-policy -o /tmp/refund-policy.asxp
      - run: python -m src.asxp.cli verify /tmp/refund-policy.asxp
      - run: ruby -e "require 'yaml'; YAML.load_file('spec/openapi.yaml')"
